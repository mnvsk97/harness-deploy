name: pi-steppable-gateway
type: service
workspace_fqn: ${TFY_WORKSPACE_FQN}
image:
  type: build
  build_source:
    type: local
    project_root_path: ${HARNESS_DEPLOY_ROOT}/harnesses/pi/gateway
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: "."
resources:
  cpu_request: 1
  cpu_limit: 2
  memory_request: 2048
  memory_limit: 4096
  ephemeral_storage_request: 12000
  ephemeral_storage_limit: 24000
env:
  PORT: "3001"
  HOME: /data/home
  PI_HOME: /data/pi
  PI_CODING_AGENT_DIR: /data/pi/agent
  PI_CODING_AGENT_SESSION_DIR: /data/pi/sessions
  PI_GATEWAY_STATE_DIR: /data/pi/gateway-state
  PI_WORKSPACE_ROOT: /data/workspaces
  PI_PROVIDER: tfy-gateway
  PI_MODEL: ${PI_MODEL}
  PI_MODEL_API: openai-responses
  PI_MODEL_BASE_URL: "tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-BASE-URL"
  PI_MODEL_API_KEY: "tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-API-KEY"
  PI_MODEL_REASONING: "true"
  PI_THINKING: ${PI_THINKING}
  PI_TELEMETRY: "0"
  PI_SKIP_VERSION_CHECK: "1"
  GATEWAY_BEARER_TOKEN: "tfy-secret://${TFY_SECRET_TENANT}:${PI_GATEWAY_SECRET_GROUP}:PI-GATEWAY-BEARER-TOKEN"
ports:
  - port: 3001
    protocol: TCP
    expose: true
    host: ${PI_GATEWAY_HOST}
    app_protocol: http
replicas: 1
rollout_strategy:
  type: rolling_update
  max_unavailable_percentage: 100
  max_surge_percentage: 0
mounts:
  - type: volume
    mount_path: /data
    volume_fqn: tfy-volume://${TFY_WORKSPACE_FQN}:pi-steppable-state-block
liveness_probe:
  config:
    type: http
    path: /healthz
    port: 3001
  initial_delay_seconds: 30
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
readiness_probe:
  config:
    type: http
    path: /readyz
    port: 3001
  initial_delay_seconds: 30
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
allow_interception: false

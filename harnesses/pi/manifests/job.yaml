name: pi-coding-job
type: job
workspace_fqn: WORKSPACE_FQN_HERE
trigger:
  type: manual
retries: 0
image:
  type: image
  image_uri: node:22-bookworm
  command: >-
    bash -lc "npm install -g @earendil-works/pi-coding-agent &&
    mkdir -p /home/node/.pi/agent /home/node/.pi/sessions /workspace &&
    cd /workspace &&
    pi -p \"${PI_PROMPT:-Say exactly: pi-ok}\" --no-session"
resources:
  cpu_request: 1
  cpu_limit: 2
  memory_request: 2048
  memory_limit: 4096
  ephemeral_storage_request: 8000
  ephemeral_storage_limit: 16000
env:
  HOME: /home/node
  PI_CODING_AGENT_DIR: /home/node/.pi/agent
  PI_CODING_AGENT_SESSION_DIR: /home/node/.pi/sessions
  PI_TELEMETRY: "0"
  PI_PROMPT: "Say exactly: pi-ok"
  ANTHROPIC_API_KEY: "tfy-secret://YOUR_USER_OR_TEAM:pi-secrets:ANTHROPIC_API_KEY"
  OPENAI_API_KEY: "tfy-secret://YOUR_USER_OR_TEAM:pi-secrets:OPENAI_API_KEY"

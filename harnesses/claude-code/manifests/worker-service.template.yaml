name: claude-code-worker
type: service
workspace_fqn: WORKSPACE_FQN_HERE
image:
  type: build
  build_source:
    type: git
    repo_url: https://github.com/YOUR_ORG/YOUR_CLAUDE_CODE_WORKER
    branch_name: main
    ref: PINNED_COMMIT_SHA
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: "."
  command: node server.js
resources:
  cpu_request: 1
  cpu_limit: 2
  memory_request: 2048
  memory_limit: 4096
  ephemeral_storage_request: 8000
  ephemeral_storage_limit: 16000
env:
  ANTHROPIC_API_KEY: "tfy-secret://YOUR_USER_OR_TEAM:claude-code-secrets:ANTHROPIC_API_KEY"
ports:
  - port: 8080
    expose: true
    host: claude-code-worker.YOUR_TFY_BASE_DOMAIN
    app_protocol: http
replicas: 1

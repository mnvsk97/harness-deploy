name: deepagents-coding-job
type: job
workspace_fqn: WORKSPACE_FQN_HERE
trigger:
  type: manual
retries: 1
image:
  type: image
  image_uri: ghcr.io/astral-sh/uv:python3.12-bookworm
  command: >-
    bash -lc "uv pip install --system deepagents &&
    python -c \"import deepagents; print('deepagents import ok')\""
resources:
  cpu_request: 1
  cpu_limit: 2
  memory_request: 2048
  memory_limit: 4096
  ephemeral_storage_request: 4000
  ephemeral_storage_limit: 8000
env:
  ANTHROPIC_API_KEY: "tfy-secret://YOUR_USER_OR_TEAM:deepagents-secrets:ANTHROPIC_API_KEY"
  OPENAI_API_KEY: "tfy-secret://YOUR_USER_OR_TEAM:deepagents-secrets:OPENAI_API_KEY"
  LANGSMITH_API_KEY: "tfy-secret://YOUR_USER_OR_TEAM:deepagents-secrets:LANGSMITH_API_KEY"

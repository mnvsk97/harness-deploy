name: hermes-api
type: service
workspace_fqn: ${TFY_WORKSPACE_FQN}
image:
  type: build
  build_source:
    type: git
    repo_url: https://github.com/NousResearch/hermes-agent
    branch_name: main
    ref: 2b768535c9ba2a8d3b2c23fae1ee3a2f827f7f49
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: .
    command: |
      bash -lc 'set -euo pipefail
      mkdir -p /opt/data/home /opt/data/backups
      chown -R hermes:hermes /opt/data
      if [ ! -f /opt/data/config.yaml ] || [ "${HERMES_REFRESH_CONFIG:-false}" = "true" ]; then
        cat > /opt/data/config.yaml <<EOF
      custom_providers:
        - name: tfy-gateway
          base_url: ${TFY_BASE_URL}
          key_env: TFY_API_KEY
          api_mode: chat_completions
      model:
        provider: custom:tfy-gateway
        default: ${HERMES_INFERENCE_MODEL:-openai-main/gpt-5.5}
      toolsets:
        - hermes-cli
      platforms:
        api_server:
          enabled: true
      platform_toolsets:
        api_server:
          - hermes-api-server
      EOF
        chown hermes:hermes /opt/data/config.yaml
      fi
      exec /usr/bin/su -m hermes -s /bin/bash -c "export HOME=/opt/data/home XDG_CONFIG_HOME=/opt/data/home/.config XDG_CACHE_HOME=/opt/data/home/.cache && source /opt/hermes/.venv/bin/activate && exec hermes gateway run"'
resources:
  cpu_request: 0.5
  cpu_limit: 1
  memory_request: 1024
  memory_limit: 2048
  ephemeral_storage_request: 4000
  ephemeral_storage_limit: 8000
replicas: 1
env:
  HOME: /opt/data/home
  HERMES_HOME: /opt/data
  HERMES_REFRESH_CONFIG: "false"
  TFY_BASE_URL: tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-BASE-URL
  TFY_API_KEY: tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-API-KEY
  HERMES_INFERENCE_PROVIDER: custom:tfy-gateway
  HERMES_INFERENCE_MODEL: openai-main/gpt-5.5
  API_SERVER_ENABLED: "true"
  API_SERVER_HOST: 0.0.0.0
  API_SERVER_PORT: "8642"
  API_SERVER_MODEL_NAME: openai-main/gpt-5.5
  API_SERVER_KEY: tfy-secret://${TFY_SECRET_TENANT}:${CODEX_GATEWAY_SECRET_GROUP}:CODEX-GATEWAY-BEARER-TOKEN
ports:
  - port: 8642
    protocol: TCP
    expose: true
    host: ${HERMES_API_HOST}
    app_protocol: http
mounts:
  - type: volume
    mount_path: /opt/data
    volume_fqn: tfy-volume://${TFY_WORKSPACE_FQN}:hermes-state-block
liveness_probe:
  config:
    type: http
    path: /health
    port: 8642
    scheme: HTTP
  initial_delay_seconds: 30
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
readiness_probe:
  config:
    type: http
    path: /health
    port: 8642
    scheme: HTTP
  initial_delay_seconds: 30
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
rollout_strategy:
  type: rolling_update
  max_surge_percentage: 0
  max_unavailable_percentage: 100

name: openswe-service
type: service
workspace_fqn: WORKSPACE_FQN_HERE
image:
  type: build
  build_source:
    type: git
    repo_url: https://github.com/langchain-ai/open-swe
    branch_name: main
    ref: PINNED_COMMIT_SHA
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: .
  command:
    - bash
    - -lc
    - uv run langgraph dev --host 0.0.0.0 --port 2024 --no-browser
resources:
  cpu_request: 1
  cpu_limit: 2
  memory_request: 2048
  memory_limit: 4096
  ephemeral_storage_request: 4096
  ephemeral_storage_limit: 8192
replicas: 1
env:
  SANDBOX_TYPE: daytona
  DAYTONA_API_KEY: tfy-secret://WORKSPACE_OR_USER:openswe-secrets:DAYTONA-API-KEY
  OPENAI_BASE_URL: tfy-secret://WORKSPACE_OR_USER:codex-tfy-gateway-secrets:TFY-GATEWAY-BASE-URL
  OPENAI_API_KEY: tfy-secret://WORKSPACE_OR_USER:codex-tfy-gateway-secrets:TFY-GATEWAY-API-KEY
  OPENSWE_OPENAI_MODEL_ID: openai:openai-main/gpt-5.5
  LLM_FALLBACK_MODEL_ID: openai:openai-main/gpt-5.5
  OPENSWE_DISABLE_REPO_AUTH: "1"
ports:
  - port: 2024
    expose: true
    host: openswe.YOUR_TFY_BASE_DOMAIN
    app_protocol: http

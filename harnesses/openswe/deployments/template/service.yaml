name: openswe-service
type: service
workspace_fqn: ${TFY_WORKSPACE_FQN}
image:
  type: build
  build_source:
    type: local
    project_root_path: ${HARNESS_DEPLOY_ROOT}/harnesses/openswe/deployments/template
    local_build: false
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: "."
resources:
  cpu_request: 1
  cpu_limit: 2
  memory_request: 2048
  memory_limit: 4096
  ephemeral_storage_request: 4096
  ephemeral_storage_limit: 8192
replicas: 1
env:
  SANDBOX_TYPE: daytona
  DAYTONA_API_KEY: "tfy-secret://${TFY_SECRET_TENANT}:${OPENSWE_SECRET_GROUP}:DAYTONA-API-KEY"
  OPENAI_BASE_URL: "tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-BASE-URL"
  OPENAI_API_KEY: "tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-API-KEY"
  OPENSWE_OPENAI_MODEL_ID: openai:openai-main/gpt-5.5
  LLM_FALLBACK_MODEL_ID: openai:openai-main/gpt-5.5
  OPENSWE_OPENAI_USE_RESPONSES_API: "0"
  OPENSWE_DISABLE_REPO_AUTH: "1"
  OPENSWE_DEFAULT_REPO: "${OPENSWE_DEFAULT_REPO}"
  OPENSWE_DASHBOARD_AUTH_DISABLED: "1"
  OPENSWE_DASHBOARD_SERVICE_USER: slack
  OPENSWE_DASHBOARD_SERVICE_EMAIL: slack@truefoundry.local
  LANGGRAPH_URL_PROD: http://localhost:2024
  DASHBOARD_ALLOWED_ORIGINS: "*"
ports:
  - port: 2024
    protocol: TCP
    expose: true
    host: ${OPENSWE_API_HOST}
    app_protocol: http
readiness_probe:
  config:
    type: http
    path: /health
    port: 2024
  initial_delay_seconds: 30
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 6
liveness_probe:
  config:
    type: http
    path: /health
    port: 2024
  initial_delay_seconds: 60
  period_seconds: 20
  timeout_seconds: 5
  failure_threshold: 6
rollout_strategy:
  type: rolling_update
  max_unavailable_percentage: 100
  max_surge_percentage: 0
allow_interception: false

name: goose-api
type: service
workspace_fqn: ${TFY_WORKSPACE_FQN}
image:
  type: build
  build_source:
    type: local
    project_root_path: ${HARNESS_DEPLOY_ROOT}/harnesses/goose/goosed-image
    local_build: false
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: "."
  command:
    - bash
    - -lc
    - |
      set -euo pipefail
      mkdir -p /data/home/.config/goose/custom_providers /data/workspace
      chown -R goose:goose /data
      cat > /data/home/.config/goose/custom_providers/tfy_gateway.json <<EOF
      {
        "name": "tfy_gateway",
        "engine": "openai",
        "display_name": "TrueFoundry Gateway",
        "description": "TrueFoundry AI Gateway OpenAI-compatible endpoint",
        "api_key_env": "TFY_GATEWAY_API_KEY",
        "base_url": "$TFY_GATEWAY_BASE_URL",
        "models": [
          {
            "name": "${GOOSE_MODEL}",
            "context_limit": 200000
          }
        ],
        "supports_streaming": true,
        "requires_auth": true
      }
      EOF
      chown goose:goose /data/home/.config/goose/custom_providers/tfy_gateway.json
      exec /usr/bin/su -m goose -s /bin/bash -c "cd /data/workspace && exec goosed agent"
resources:
  cpu_request: 2
  cpu_limit: 4
  memory_request: 4096
  memory_limit: 8192
  ephemeral_storage_request: 20000
  ephemeral_storage_limit: 40000
replicas: 1
env:
  HOME: /data/home
  GOOSE_PROVIDER: tfy_gateway
  GOOSE_MODEL: ${GOOSE_MODEL}
  GOOSE_HOST: 0.0.0.0
  GOOSE_PORT: "3000"
  GOOSE_TLS: "false"
  GOOSE_SERVER__SECRET_KEY: tfy-secret://${TFY_SECRET_TENANT}:${CODEX_GATEWAY_SECRET_GROUP}:CODEX-GATEWAY-BEARER-TOKEN
  TFY_GATEWAY_BASE_URL: tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-BASE-URL
  TFY_GATEWAY_API_KEY: tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-API-KEY
ports:
  - port: 3000
    protocol: TCP
    expose: true
    host: ${GOOSE_API_HOST}
    app_protocol: http
mounts:
  - type: volume
    mount_path: /data
    volume_fqn: tfy-volume://${TFY_WORKSPACE_FQN}:goose-state-block
readiness_probe:
  config:
    type: http
    path: /status
    port: 3000
  initial_delay_seconds: 30
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 6
liveness_probe:
  config:
    type: http
    path: /status
    port: 3000
  initial_delay_seconds: 60
  period_seconds: 20
  timeout_seconds: 5
  failure_threshold: 6
rollout_strategy:
  type: rolling_update
  max_unavailable_percentage: 100
  max_surge_percentage: 0
allow_interception: false

name: goose-api
type: service
workspace_fqn: ${TFY_WORKSPACE_FQN}
image:
  type: build
  build_source:
    type: local
    project_root_path: ${HARNESS_DEPLOY_ROOT}/harnesses/goose/goosed-image
    local_build: false
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: "."
  command:
    - bash
    - -lc
    - |
      set -euo pipefail
      mkdir -p /data/home/.config/goose/custom_providers /data/workspace
      chown -R goose:goose /data
      exec /usr/bin/su -m goose -s /bin/bash -c "export HOME=/data/home XDG_CONFIG_HOME=/data/home/.config XDG_CACHE_HOME=/data/home/.cache && cd /data/workspace && exec goosed agent"
resources:
  cpu_request: 1
  cpu_limit: 2
  memory_request: 2048
  memory_limit: 4096
  ephemeral_storage_request: 8000
  ephemeral_storage_limit: 16000
replicas: 1
env:
  HOME: /data/home
  XDG_CONFIG_HOME: /data/home/.config
  XDG_CACHE_HOME: /data/home/.cache
  GOOSE_DISABLE_KEYRING: "1"
  GOOSE_PROVIDER: openai
  GOOSE_MODEL: ${GOOSE_MODEL}
  OPENAI_HOST: tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-BASE-URL
  OPENAI_BASE_PATH: /v1/chat/completions
  OPENAI_API_KEY: tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-API-KEY
  GOOSE_HOST: 0.0.0.0
  GOOSE_PORT: "3000"
  GOOSE_TLS: "false"
  GOOSE_SERVER__SECRET_KEY: tfy-secret://${TFY_SECRET_TENANT}:${GOOSE_SECRET_GROUP}:GOOSE-SERVER-SECRET-KEY
  DAYTONA_API_KEY: tfy-secret://${TFY_SECRET_TENANT}:${GOOSE_SECRET_GROUP}:DAYTONA-API-KEY
  TFY_GATEWAY_BASE_URL: tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-BASE-URL
  TFY_GATEWAY_API_KEY: tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-API-KEY
ports:
  - port: 3000
    protocol: TCP
    expose: true
    host: ${GOOSE_API_HOST}
    app_protocol: http
mounts:
  - type: volume
    mount_path: /data
    volume_fqn: tfy-volume://${TFY_WORKSPACE_FQN}:goose-state-block
readiness_probe:
  config:
    type: http
    path: /status
    port: 3000
  initial_delay_seconds: 30
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 6
liveness_probe:
  config:
    type: http
    path: /status
    port: 3000
  initial_delay_seconds: 60
  period_seconds: 20
  timeout_seconds: 5
  failure_threshold: 6
rollout_strategy:
  type: rolling_update
  max_unavailable_percentage: 100
  max_surge_percentage: 0
allow_interception: false

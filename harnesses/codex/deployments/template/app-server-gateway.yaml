name: codex-http-gateway
type: service
workspace_fqn: ${TFY_WORKSPACE_FQN}
image:
  type: build
  build_source:
    type: local
    project_root_path: ${HARNESS_DEPLOY_ROOT}/harnesses/codex/gateway
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: "."
resources:
  cpu_request: 1
  cpu_limit: 2
  memory_request: 2048
  memory_limit: 4096
  ephemeral_storage_request: 8000
  ephemeral_storage_limit: 16000
env:
  PORT: "3001"
  HOME: /data/home
  CODEX_HOME: /data/codex
  WORKSPACE_ROOT: /data/workspace
  CODEX_MODEL: openai-main/gpt-5.5
  CODEX_MODEL_PROVIDER: tfy-gateway
  TFY_GATEWAY_BASE_URL: "tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-BASE-URL"
  TFY_GATEWAY_API_KEY: "tfy-secret://${TFY_SECRET_TENANT}:${TFY_GATEWAY_SECRET_GROUP}:TFY-GATEWAY-API-KEY"
  TFY_GATEWAY_SUPPORTS_WEBSOCKETS: "false"
  CODEX_APPROVAL_POLICY: never
  CODEX_SANDBOX: danger-full-access
  CODEX_SERVICE_NAME: tfy_codex_harness
  GATEWAY_BEARER_TOKEN: "tfy-secret://${TFY_SECRET_TENANT}:${CODEX_GATEWAY_SECRET_GROUP}:CODEX-GATEWAY-BEARER-TOKEN"
ports:
  - port: 3001
    protocol: TCP
    expose: true
    host: ${CODEX_GATEWAY_HOST}
    app_protocol: http
replicas: 1
rollout_strategy:
  type: rolling_update
  max_unavailable_percentage: 100
  max_surge_percentage: 0
mounts:
  - type: volume
    mount_path: /data
    volume_fqn: tfy-volume://${TFY_WORKSPACE_FQN}:codex-state-block
liveness_probe:
  config:
    type: http
    path: /healthz
    port: 3001
  initial_delay_seconds: 30
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
readiness_probe:
  config:
    type: http
    path: /readyz
    port: 3001
  initial_delay_seconds: 30
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
allow_interception: false

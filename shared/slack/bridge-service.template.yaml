name: ${SLACK_BRIDGE_SERVICE_NAME}
type: service
workspace_fqn: ${TFY_WORKSPACE_FQN}
image:
  type: build
  build_source:
    type: local
    local_build: false
    project_root_path: ${HARNESS_DEPLOY_ROOT}/shared/slack/bridge
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
    build_context_path: "."
resources:
  cpu_request: 0.5
  cpu_limit: 1
  memory_request: 512
  memory_limit: 1024
  ephemeral_storage_request: 1000
  ephemeral_storage_limit: 2000
env:
  PORT: "3000"
  SLACK_BOT_TOKEN: "tfy-secret://${TFY_SECRET_TENANT}:${SLACK_SECRET_GROUP}:SLACK-BOT-TOKEN"
  SLACK_SIGNING_SECRET: "tfy-secret://${TFY_SECRET_TENANT}:${SLACK_SECRET_GROUP}:SLACK-SIGNING-SECRET"
  SLACK_REQUIRE_MENTION: "true"
  SLACK_STRICT_MENTION: "true"
  SLACK_FREE_RESPONSE_CHANNELS: ""
  SLACK_UPDATE_THROTTLE_MS: "1500"
  SLACK_REACTION_RUNNING: "eyes"
  SLACK_REACTION_SUCCESS: "white_check_mark"
  SLACK_REACTION_FAILURE: "x"
  SLACK_PROCESSED_EVENT_TTL_MS: "86400000"
  SLACK_PROCESSED_EVENT_LIMIT: "5000"
  SLACK_SESSION_SCOPE: "${SLACK_SESSION_SCOPE}"
  HARNESS_NAME: "${SLACK_BRIDGE_HARNESS_NAME}"
  HARNESS_API_URL: "${SLACK_BRIDGE_HARNESS_API_URL}"
  HARNESS_API_TOKEN: "tfy-secret://${TFY_SECRET_TENANT}:${SLACK_BRIDGE_TARGET_SECRET_GROUP}:${SLACK_BRIDGE_TARGET_TOKEN_KEY}"
  HARNESS_AUTH_HEADER: "${SLACK_BRIDGE_AUTH_HEADER}"
  HARNESS_AUTH_SCHEME: "${SLACK_BRIDGE_AUTH_SCHEME}"
  HARNESS_BODY_PROFILE: "${SLACK_BRIDGE_BODY_PROFILE}"
  HARNESS_SEND_INITIAL_MESSAGE_AFTER_CREATE: "${SLACK_BRIDGE_SEND_INITIAL_MESSAGE_AFTER_CREATE}"
  HARNESS_WORKING_DIR: "${SLACK_BRIDGE_WORKING_DIR}"
  HARNESS_SESSION_CREATE_PATH: "${SLACK_BRIDGE_SESSION_CREATE_PATH}"
  HARNESS_SESSION_MESSAGE_PATH_TEMPLATE: "${SLACK_BRIDGE_SESSION_MESSAGE_PATH_TEMPLATE}"
  HARNESS_SESSION_EVENTS_PATH_TEMPLATE: "${SLACK_BRIDGE_SESSION_EVENTS_PATH_TEMPLATE}"
  HARNESS_OPENAI_CHAT_PATH: "${SLACK_BRIDGE_OPENAI_CHAT_PATH}"
  HARNESS_OPENAI_MAX_HISTORY_MESSAGES: "${SLACK_BRIDGE_OPENAI_MAX_HISTORY_MESSAGES}"
  HARNESS_OPENAI_TEMPERATURE: "${SLACK_BRIDGE_OPENAI_TEMPERATURE}"
  HARNESS_OPENAI_SEND_USER: "${SLACK_BRIDGE_OPENAI_SEND_USER}"
  HARNESS_OPENAI_SEND_SESSION_KEY: "${SLACK_BRIDGE_OPENAI_SEND_SESSION_KEY}"
  HARNESS_OPENAI_INJECT_SLACK_IDENTITY_GUARD: "${SLACK_BRIDGE_OPENAI_INJECT_SLACK_IDENTITY_GUARD}"
  HARNESS_POLL_EVENTS: "${SLACK_BRIDGE_POLL_EVENTS}"
  HARNESS_IGNORE_EVENT_TIMEOUTS: "${SLACK_BRIDGE_IGNORE_EVENT_TIMEOUTS}"
ports:
  - port: 3000
    protocol: TCP
    expose: true
    host: ${SLACK_BRIDGE_HOST}
    app_protocol: http
replicas: 1
rollout_strategy:
  type: rolling_update
  max_unavailable_percentage: 100
  max_surge_percentage: 0
liveness_probe:
  config:
    type: http
    path: /healthz
    port: 3000
  initial_delay_seconds: 30
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
readiness_probe:
  config:
    type: http
    path: /readyz
    port: 3000
  initial_delay_seconds: 30
  period_seconds: 15
  timeout_seconds: 5
  failure_threshold: 5
